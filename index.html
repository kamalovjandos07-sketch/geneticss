<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaryoLab LIMS — EdTech Startup</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; overflow: hidden; }
        .mono { font-family: 'Roboto Mono', monospace; }
        
        .app-screen { position: fixed; inset: 0; display: none; flex-direction: column; background: #0f172a; }
        .app-screen.active { display: flex; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Игровые элементы */
        .game-item { cursor: pointer; transition: all 0.2s; filter: drop-shadow(0 10px 8px rgba(0,0,0,0.5)); }
        .game-item:hover { transform: scale(1.1) translateY(-5px); filter: drop-shadow(0 15px 12px rgba(59,130,246,0.5)); }
        
        .spinning { animation: spin 3s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes spin { 100% { transform: rotate(3600deg); } }

        #error-toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); background: #ef4444; padding: 16px 32px; border-radius: 99px; font-weight: 900; opacity: 0; transition: 0.3s; z-index: 100; box-shadow: 0 0 30px rgba(239, 68, 68, 0.5); }
    </style>
</head>
<body class="antialiased">

    <div id="error-toast" class="uppercase tracking-widest text-sm">Нарушение протокола!</div>

    <div id="landing-page" class="app-screen active items-center justify-center text-center">
        <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_#1e293b_0%,_#020617_100%)] -z-10"></div>
        <h1 class="text-6xl md:text-9xl font-black mb-6 tracking-tighter leading-tight italic">
            KARYO<span class="text-blue-500">LAB</span>
        </h1>
        <p class="text-xl text-slate-400 mb-12 max-w-2xl font-light mx-auto">
            Виртуальная лаборатория цитогенетики. <br>Отработка навыков для будущих генетиков.
        </p>
        <button onclick="startApp()" class="px-12 py-6 bg-blue-600 hover:bg-blue-500 text-white font-black text-sm uppercase tracking-[0.2em] rounded-full shadow-[0_0_50px_rgba(37,99,235,0.4)] transition-all hover:scale-110">
            Запустить симуляцию
        </button>
        <div class="absolute bottom-10 text-[10px] uppercase tracking-[0.5em] text-slate-600">Developed by J. Kamalov | KazNMU</div>
    </div>

    <div id="app-phleb" class="app-screen">
        <header class="h-20 border-b border-white/10 flex items-center px-10 bg-slate-950 justify-between">
            <span class="font-bold text-blue-500 uppercase tracking-widest">Этап 1: Преаналитика</span>
            <span id="phleb-hint" class="text-white font-bold animate-pulse">Наложите жгут</span>
        </header>
        <div class="flex-grow relative flex items-center justify-center bg-[radial-gradient(circle_at_center,_#1e293b_0%,_#020617_100%)]">
            <img id="phleb-arm" src="arm.png" class="w-[600px] object-contain transition-all duration-500" alt="Рука">
            <div class="absolute bottom-10 flex gap-8 bg-slate-900/80 p-6 rounded-3xl border border-white/10 backdrop-blur-md">
                <img src="tourniquet.png" onclick="phlebAction('tourn')" class="game-item w-24 h-24 object-contain" alt="Жгут">
                <img src="swab.png" onclick="phlebAction('swab')" class="game-item w-20 h-20 object-contain" alt="Салфетка">
                <img src="syringe.png" onclick="phlebAction('syr')" class="game-item w-32 h-20 object-contain" alt="Шприц">
            </div>
        </div>
    </div>

    <div id="app-lab" class="app-screen">
        <div class="flex h-full">
            <div class="w-32 border-r border-white/5 flex flex-col items-center py-10 gap-10 bg-slate-950/50 backdrop-blur-xl">
                <div class="text-[10px] font-bold text-slate-500 uppercase rotate-90 mb-6 tracking-[0.3em]">Reagents</div>
                <img src="pha.png" onclick="labAction('pha')" class="w-16 h-20 object-contain game-item" title="ФГА">
                <img src="colchicine.png" onclick="labAction('col')" class="w-16 h-20 object-contain game-item" title="Колхицин">
                <img src="kcl.avif" onclick="labAction('kcl')" class="w-16 h-20 object-contain game-item" title="KCl">
                <img src="fixative.png" onclick="labAction('fix')" class="game-item w-16 h-20 object-contain" title="Фиксатор">
                <img src="pipette.png" onclick="labAction('drop')" class="game-item w-14 h-32 object-contain mt-auto" title="Пипетка">
            </div>

            <div class="flex-grow flex flex-col relative bg-[url('desk_bg.png')] bg-cover bg-center">
                <div class="absolute inset-0 bg-slate-900/70"></div>
                <header class="h-16 border-b border-white/10 flex items-center px-10 justify-between relative z-10 bg-slate-950/40">
                    <span id="lab-instruction" class="text-blue-400 font-black uppercase tracking-widest text-sm italic">Добавьте митоген (ФГА)</span>
                    <div class="mono text-[10px] text-slate-500">LAB_SESSION: 2026-X7</div>
                </header>
                
                <div class="flex-grow flex items-center justify-center relative">
                    <img id="lab-tube" src="tube_empty.png" class="w-24 h-96 object-contain z-20 drop-shadow-[0_35px_60px_rgba(0,0,0,0.8)] transition-all duration-500" alt="Tube">
                    <img id="lab-slide" src="slide.png" class="hidden absolute w-72 h-24 object-contain z-10" alt="Slide">
                </div>
            </div>

            <div class="w-72 border-l border-white/5 flex flex-col bg-slate-950/50 p-6 gap-6">
                <h3 class="text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-2">Equipment</h3>
                <div onclick="labAction('inc')" class="p-4 rounded-2xl bg-slate-900/50 border border-white/5 hover:border-blue-500/50 transition-all cursor-pointer group text-center">
                    <span class="text-[9px] font-bold uppercase text-slate-500 group-hover:text-blue-400">Термостат</span>
                    <img src="incubator.png" class="w-full h-24 object-contain mt-2 opacity-70 group-hover:opacity-100 transition">
                </div>
                <div onclick="labAction('spin')" id="btn-spin" class="p-4 rounded-2xl bg-slate-900/50 border border-white/5 hover:border-blue-500/50 transition-all cursor-pointer group text-center">
                    <span class="text-[9px] font-bold uppercase text-slate-500 group-hover:text-blue-400">Центрифуга</span>
                    <img src="centrifuge.png" class="w-full h-24 object-contain mt-2 opacity-70 group-hover:opacity-100 transition">
                </div>
                <div onclick="labAction('micro')" class="p-4 rounded-2xl bg-slate-900/50 border border-white/5 hover:border-blue-500/50 transition-all cursor-pointer group text-center">
                    <span class="text-[9px] font-bold uppercase text-slate-500 group-hover:text-blue-400">Микроскоп</span>
                    <img src="microscope.png" class="w-full h-32 object-contain mt-2 opacity-70 group-hover:opacity-100 transition">
                </div>
            </div>
        </div>
    </div>

    <div id="app-res" class="app-screen bg-slate-950 p-12">
        <div class="max-w-5xl mx-auto flex gap-12 items-center h-full">
            <img id="res-img" src="" class="w-1/2 rounded-3xl border border-white/10 shadow-2xl bg-slate-900 p-6 object-contain min-h-[400px]">
            <div class="w-1/2">
                <h2 id="res-name" class="text-6xl font-black mb-4 tracking-tighter italic text-white">---</h2>
                <div id="res-karyo" class="text-2xl mono font-bold text-blue-500 mb-6 p-4 bg-blue-500/10 rounded-xl inline-block border-l-4 border-blue-500">---</div>
                <p id="res-info" class="text-slate-400 text-lg mb-10 leading-relaxed"></p>
                <button onclick="location.reload()" class="px-12 py-5 bg-white text-black font-black uppercase tracking-widest rounded-full hover:bg-blue-600 hover:text-white transition-all shadow-2xl">Повторить протокол</button>
            </div>
        </div>
    </div>

    <script>
        const toast = document.getElementById('error-toast');
        const tube = document.getElementById('lab-tube');

        function showError() {
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2500);
        }

        function startApp() {
            document.getElementById('landing-page').classList.remove('active');
            document.getElementById('app-phleb').classList.add('active');
        }

        // --- ЛОГИКА ЗАБОРА КРОВИ ---
        let pStep = 0;
        function phlebAction(act) {
            const arm = document.getElementById('phleb-arm');
            const hint = document.getElementById('phleb-hint');

            if(act === 'tourn' && pStep === 0) {
                arm.src = 'arm_tourniquet.png'; // Твой файл со жгутом!
                hint.textContent = 'Обработайте антисептиком';
                pStep = 1;
            } else if(act === 'swab' && pStep === 1) {
                hint.textContent = 'Введите вакутейнер';
                pStep = 2;
            } else if(act === 'syr' && pStep === 2) {
                hint.textContent = 'Материал собран. Идем в лабораторию...';
                setTimeout(() => {
                    document.getElementById('app-phleb').classList.remove('active');
                    document.getElementById('app-lab').classList.add('active');
                    tube.src = 'tube_blood.png'; // Пробирка теперь с кровью
                }, 1500);
            } else { showError(); }
        }

        // --- ЛОГИКА ЛАБОРАТОРИИ ---
        let lStep = 0;
        function labAction(act) {
            const instr = document.getElementById('lab-instruction');

            if(act === 'pha' && lStep === 0) {
                instr.textContent = 'Поместите в термостат (37°C)';
                lStep = 1;
            } else if(act === 'inc' && lStep === 1) {
                tube.style.opacity = '0.4';
                instr.textContent = 'Инкубация в процессе...';
                setTimeout(() => { 
                    tube.style.opacity = '1'; 
                    instr.textContent = 'Добавьте Колхицин (остановка деления)'; 
                    lStep = 2; 
                }, 2000);
            } else if(act === 'col' && lStep === 2) {
                instr.textContent = 'Проведите центрифугирование';
                lStep = 3;
            } else if(act === 'spin' && lStep === 3) {
                document.querySelector('#btn-spin img').classList.add('spinning');
                instr.textContent = 'Разделение фракций...';
                setTimeout(() => {
                    document.querySelector('#btn-spin img').classList.remove('spinning');
                    tube.src = 'tube_pellet.png'; // Меняем на пробирку с осадком!
                    instr.textContent = 'Добавьте KCl (гипотоник)';
                    lStep = 4;
                }, 3000);
            } else if(act === 'kcl' && lStep === 4) {
                tube.src = 'tube_swollen.png'; // Набухшие клетки
                tube.style.transform = 'scale(1.15)';
                instr.textContent = 'Зафиксируйте (Фиксатор Карнуа)';
                lStep = 5;
            } else if(act === 'fix' && lStep === 5) {
                tube.style.transform = 'scale(1)';
                instr.textContent = 'Используйте пипетку для раскапывания';
                lStep = 6;
            } else if(act === 'drop' && lStep === 6) {
                tube.classList.add('hidden');
                document.getElementById('lab-slide').classList.remove('hidden');
                instr.textContent = 'Микроскопический анализ';
                lStep = 7;
            } else if(act === 'micro' && lStep === 7) {
                finish();
            } else { showError(); }
        }

        function finish() {
            document.getElementById('app-lab').classList.remove('active');
            document.getElementById('app-res').classList.add('active');
            const data = [
                { name: 'Norma (XX)', k: '46, XX', i: 'Кариотип в норме. Численных аномалий не обнаружено.', img: 'norm_f.jpg' },
                { name: 'Norma (XY)', k: '46, XY', i: 'Кариотип в норме. Генетический пол мужской.', img: 'norm_m.jpg' },
                { name: 'Down Syndrome', k: '47, XY, +21', i: 'Выявлена трисомия по 21-й паре хромосом.', img: 'down.jpg' }
            ];
            const final = data[Math.floor(Math.random() * data.length)];
            document.getElementById('res-name').textContent = final.name;
            document.getElementById('res-karyo').textContent = final.k;
            document.getElementById('res-info').textContent = final.i;
            document.getElementById('res-img').src = final.img;
        }
    </script>
</body>
</html>
</body>
</html>
