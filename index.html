<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaryoLab Pro — Digital Medic</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #0f172a; --accent: #3b82f6; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; overflow: hidden; }
        
        /* Плавный переход страниц */
        .page-fade { transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out; }
        .page-hidden { opacity: 0; pointer-events: none; transform: scale(0.98); position: absolute; width: 100%; }
        
        /* Игровой оверлей квеста */
        #quest-overlay {
            pointer-events: none;
            z-index: 999;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.8), transparent);
        }
        .quest-anim { animation: questIn 2.5s forwards; }
        @keyframes questIn {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); filter: blur(10px); }
            20% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
            80% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
            100% { opacity: 0; transform: scale(1.1) translateY(-20px); filter: blur(10px); }
        }

        /* Затемнение для переходов */
        #flash-overlay {
            position: fixed; inset: 0; background: black; z-index: 1000; opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease-in-out;
        }

        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .liquid { transition: height 1.5s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.8s; }
        
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        details[open] summary span:last-child { transform: rotate(180deg); }
    </style>
</head>
<body class="h-screen flex flex-col bg-slate-50">

    <div id="flash-overlay"></div>
    <div id="quest-overlay" class="fixed inset-0 flex flex-col items-center justify-center opacity-0">
        <div class="text-[10px] font-black tracking-[0.5em] text-blue-500 uppercase mb-2">Новая задача</div>
        <h2 id="quest-title" class="text-4xl md:text-6xl font-black text-white text-center uppercase italic"></h2>
        <div class="w-24 h-1 bg-blue-500 mt-4"></div>
    </div>

    <div id="page-landing" class="page-fade h-screen flex flex-col items-center justify-center relative p-6 overflow-hidden">
        <div class="absolute inset-0 opacity-[0.03] select-none pointer-events-none text-[30rem] flex items-center justify-center font-black">DNA</div>
        <div class="z-10 text-center max-w-3xl">
            <h1 class="text-6xl md:text-8xl font-black mb-6 text-slate-900 tracking-tighter">KARYO<span class="text-blue-600">LAB</span></h1>
            <p class="text-lg text-slate-500 mb-10 font-light tracking-wide">Симулятор цитогенетической диагностики <br><span class="font-bold text-slate-400">v3.5 Professional Edition</span></p>
            <button onclick="changePage('page-landing', 'page-phleb')" class="px-14 py-6 bg-slate-950 text-white rounded-full font-bold text-sm uppercase tracking-widest hover:scale-105 transition-all shadow-2xl">
                Запустить протокол
            </button>
        </div>
    </div>

    <div id="page-phleb" class="page-fade page-hidden h-screen flex flex-col bg-white">
        <header class="h-20 border-b flex items-center px-10">
            <span class="text-xs font-black tracking-widest text-slate-400 uppercase">Stage 01: Phlebotomy</span>
        </header>
        <main class="flex-grow flex flex-col items-center justify-center">
            <div class="relative w-32 h-80 bg-slate-100 rounded-full border-8 border-slate-200 flex items-end justify-center pb-2 shadow-inner overflow-hidden">
                <div class="absolute top-0 w-full h-12 bg-emerald-500 border-b-4 border-emerald-600 z-10"></div>
                <div id="phleb-blood" class="w-full bg-red-600 h-0 transition-all duration-[2500ms]"></div>
            </div>
            <div class="mt-16 flex flex-col items-center gap-6">
                <button id="draw-btn" onclick="drawBlood()" class="px-10 py-5 bg-red-600 text-white rounded-full font-bold uppercase tracking-widest shadow-xl hover:bg-red-700 transition-all">Взять пробу</button>
                <button id="to-lab-btn" onclick="changePage('page-phleb', 'page-lab')" class="hidden px-10 py-5 bg-slate-900 text-white rounded-full font-bold uppercase tracking-widest animate-bounce">Перейти в лабораторию →</button>
            </div>
        </main>
    </div>

    <div id="page-lab" class="page-fade page-hidden h-screen flex flex-col">
        <header class="h-16 bg-white border-b flex items-center justify-between px-10 z-50">
            <div class="flex items-center gap-3">
                <div class="w-6 h-6 bg-blue-600 rounded"></div>
                <span class="text-[10px] font-black uppercase tracking-widest">Lab Environment</span>
            </div>
            <div id="step-badge" class="px-4 py-1 bg-slate-900 text-white text-[9px] font-bold rounded-full">STEP 1/6</div>
        </header>

        <div class="flex-grow flex">
            <aside class="w-80 bg-slate-50 border-r p-8 flex flex-col gap-4">
                <h3 class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-4">Inventory</h3>
                <div id="inventory" class="space-y-3">
                    </div>
            </aside>

            <main class="flex-grow flex items-center justify-center relative bg-slate-100/50">
                <div id="drop-zone" class="w-72 h-[450px] bg-white border-2 border-dashed border-slate-300 rounded-[50px] flex flex-col items-center justify-end pb-12 transition-all shadow-2xl">
                    <div id="tube-body" class="relative w-20 h-64 border-4 border-slate-300 rounded-b-full rounded-t-xl bg-white/80 overflow-hidden transition-all duration-700">
                        <div id="liquid-fill" class="liquid absolute bottom-0 w-full bg-red-600" style="height: 20%"></div>
                    </div>
                    <div class="mt-8 text-center">
                        <div id="tube-status" class="text-[11px] font-bold text-slate-400 uppercase tracking-tighter">Система готова</div>
                    </div>
                </div>
                <div id="incubator-ui" class="absolute inset-0 bg-slate-900/90 hidden flex flex-col items-center justify-center text-white z-[60] animate-fade">
                    <div class="text-6xl mb-6 animate-pulse">🌡️</div>
                    <div class="text-2xl font-black mb-2 tracking-tighter">37.0°C — СТАБИЛЬНО</div>
                    <p class="text-slate-400 text-sm">Культивирование лимфоцитов...</p>
                </div>
            </main>

            <aside class="w-96 bg-white border-l p-10 flex flex-col">
                <h2 id="instr-title" class="text-2xl font-black mb-4 uppercase tracking-tighter"></h2>
                <p id="instr-desc" class="text-slate-500 text-sm leading-relaxed font-light"></p>
                
                <div id="error-alert" class="hidden mt-6 p-4 bg-red-50 text-red-600 border border-red-100 rounded-2xl text-[10px] font-black uppercase tracking-widest">
                    ⚠️ Нарушен порядок протокола!
                </div>
            </aside>
        </div>
    </div>

    <div id="page-res" class="page-fade page-hidden fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-6 overflow-y-auto">
        <div class="max-w-6xl w-full grid lg:grid-cols-2 gap-16 py-10 items-start">
            <div class="bg-white rounded-[3rem] p-6 shadow-[0_0_50px_rgba(59,130,246,0.2)] aspect-square flex items-center justify-center">
                <img id="final-img" src="" class="max-w-full max-h-full object-contain">
            </div>
            <div class="text-white">
                <div id="res-badge" class="inline-block px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-[0.2em] mb-6"></div>
                <h2 id="res-title" class="text-5xl font-black mb-4 tracking-tighter"></h2>
                <div id="res-formula" class="font-mono text-xl text-blue-400 mb-8 block"></div>
                <p id="res-desc" class="text-slate-400 text-base leading-relaxed mb-12 font-light"></p>
                
                <div id="pathology-accordion" class="space-y-4 mb-12"></div>

                <button onclick="location.reload()" class="w-full py-5 bg-white text-black rounded-full font-black text-xs uppercase tracking-[0.3em] hover:bg-blue-500 hover:text-white transition-all">Перезапустить симуляцию</button>
            </div>
        </div>
    </div>

    <script>
        // Данные
        const items = [
            { id: 'item-pha', n: 'ФГА', t: 'Митоген', c: 'bg-blue-100 text-blue-600' },
            { id: 'item-incubator', n: '37°C', t: 'Инкубатор', c: 'bg-slate-200 text-slate-600' },
            { id: 'item-colchicine', n: 'COL', t: 'Колхицин', c: 'bg-orange-100 text-orange-600' },
            { id: 'item-kcl', n: 'KCl', t: 'Гипотония', c: 'bg-cyan-100 text-cyan-600' },
            { id: 'item-fix', n: 'FIX', t: 'Карнуа', c: 'bg-indigo-100 text-indigo-600' },
            { id: 'item-micro', n: '🔬', t: 'Анализ', c: 'bg-slate-900 text-white' }
        ];

        const protocol = [
            { req: 'item-pha', title: 'Стимуляция', desc: 'ФГА превращает лимфоциты в делящиеся бласты. Без него мы не получим метафаз.', h: '25%', c: '#991b1b', goal: 'Запустить митоз' },
            { req: 'item-incubator', title: 'Рост', desc: '72 часа в термостате. Клетки проходят фазы S и G2, готовясь к делению.', h: '25%', c: '#7f1d1d', special: 'wait', goal: 'Вырастить культуру' },
            { req: 'item-colchicine', title: 'Блокада', desc: 'Колхицин останавливает деление в метафазе, разрушая нити веретена.', h: '30%', c: '#450a0a', goal: 'Остановить деление' },
            { req: 'item-kcl', title: 'Набухание', desc: 'KCl делает клетки огромными. Это нужно, чтобы хромосомы не слипались.', h: '80%', c: '#fca5a5', special: 'swell', goal: 'Гипотонический шок' },
            { req: 'item-fix', title: 'Фиксация', desc: 'Смесь спирта и кислоты мгновенно останавливает все процессы в клетке.', h: '60%', c: '#f1f5f9', goal: 'Зафиксировать образец' },
            { req: 'item-micro', title: 'Диагностика', desc: 'Финальный этап. Окрашивание и поиск отклонений в кариотипе.', h: '60%', c: '#f1f5f9', special: 'end', goal: 'Найти патологию' }
        ];

        const allResults = [
            { file: 'norm_m.jpg', title: 'Норма (Male)', formula: '46, XY', desc: 'Патологий не выявлено.', badge: 'bg-emerald-500', isPathology: false },
            { file: 'norm_f.jpg', title: 'Норма (Female)', formula: '46, XX', desc: 'Хромосомный баланс соблюден.', badge: 'bg-emerald-500', isPathology: false },
            { 
                file: 'down.jpg', title: 'Синдром Дауна', formula: '47, XY, +21', desc: 'Трисомия по 21 хромосоме.', badge: 'bg-red-500', isPathology: true,
                details: [
                    { title: 'Мутация', text: 'Лишняя хромосома в 21-й паре вследствие нерасхождения в мейозе.' },
                    { title: 'Патогенез', text: 'Перепроизводство белков, кодируемых 21-й хромосомой, ведет к нарушениям в сердце и ЦНС.' },
                    { title: 'Симптомы', text: 'Эпикант, мышечная гипотония, пороки сердца, задержка интеллектуального развития.' },
                    { title: 'Диагностика', text: 'НИПТ, амниоцентез, кариотипирование.' }
                ]
            },
            { 
                file: 'edwards.jpg', title: 'Синдром Эдвардса', formula: '47, XX, +18', desc: 'Трисомия 18.', badge: 'bg-red-500', isPathology: true,
                details: [
                    { title: 'Мутация', text: 'Полная трисомия 18-й пары.' },
                    { title: 'Патогенез', text: 'Грубый генетический дисбаланс, вызывающий критические пороки внутренних органов.' },
                    { title: 'Симптомы', text: 'Специфическая форма черепа, скрещенные пальцы рук, стопа-качалка.' },
                    { title: 'Диагностика', text: 'УЗИ-скрининг (кисты сосудистых сплетений), инвазивные тесты.' }
                ]
            }
        ];

        let currentIdx = 0;
        let shuffled = [...allResults].sort(() => Math.random() - 0.5);

        // --- ЛОГИКА ИГРЫ ---

        function showQuest(text) {
            const overlay = document.getElementById('quest-overlay');
            const title = document.getElementById('quest-title');
            title.textContent = text;
            overlay.classList.remove('quest-anim');
            void overlay.offsetWidth; // Trigger reflow
            overlay.classList.add('quest-anim');
        }

        function changePage(from, to) {
            const flash = document.getElementById('flash-overlay');
            flash.style.opacity = '1';
            
            setTimeout(() => {
                document.getElementById(from).classList.add('page-hidden');
                document.getElementById(to).classList.remove('page-hidden');
                flash.style.opacity = '0';
                
                // Триггер квеста при входе в лабу или кабинет
                if (to === 'page-phleb') showQuest('Забор крови');
                if (to === 'page-lab') {
                    renderInventory();
                    updateLabUI();
                    showQuest(protocol[0].goal);
                }
            }, 400);
        }

        function drawBlood() {
            document.getElementById('draw-btn').classList.add('hidden');
            document.getElementById('phleb-blood').style.height = '85%';
            setTimeout(() => {
                document.getElementById('to-lab-btn').classList.remove('hidden');
            }, 2500);
        }

        function renderInventory() {
            const inv = document.getElementById('inventory');
            inv.innerHTML = items.map(i => `
                <div id="${i.id}" draggable="true" class="glass p-4 rounded-2xl flex items-center gap-4 cursor-grab active:scale-95 transition-all group">
                    <div class="w-12 h-12 ${i.c} rounded-xl flex items-center justify-center font-black text-xs">${i.n}</div>
                    <div><div class="text-[11px] font-black uppercase">${i.n}</div><div class="text-[9px] text-slate-400 uppercase tracking-widest">${i.t}</div></div>
                </div>
            `).join('');

            inv.querySelectorAll('[draggable]').forEach(el => {
                el.ondragstart = e => e.dataTransfer.setData('id', el.id);
            });
        }

        // Drop Zone
        const dz = document.getElementById('drop-zone');
        dz.ondragover = e => { e.preventDefault(); dz.style.scale = '1.02'; dz.style.borderColor = '#3b82f6'; };
        dz.ondragleave = () => { dz.style.scale = '1'; dz.style.borderColor = '#e2e8f0'; };
        dz.ondrop = e => {
            e.preventDefault();
            dz.style.scale = '1';
            const id = e.dataTransfer.getData('id');
            if (id === protocol[currentIdx].req) handleStep();
            else {
                const err = document.getElementById('error-alert');
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 2000);
            }
        };

        function handleStep() {
            const s = protocol[currentIdx];
            if (s.special === 'wait') {
                document.getElementById('incubator-ui').classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('incubator-ui').classList.add('hidden');
                    next();
                }, 2000);
            } else if (s.special === 'end') {
                showFinal();
            } else {
                next();
            }
        }

        function next() {
            currentIdx++;
            updateLabUI();
            showQuest(protocol[currentIdx].goal);
        }

        function updateLabUI() {
            const s = protocol[currentIdx];
            document.getElementById('step-badge').textContent = `STEP ${currentIdx + 1}/6`;
            document.getElementById('instr-title').textContent = s.title;
            document.getElementById('instr-desc').textContent = s.desc;
            document.getElementById('tube-status').textContent = s.goal;
            const f = document.getElementById('liquid-fill');
            f.style.height = s.h;
            f.style.backgroundColor = s.c;
            document.getElementById('tube-body').style.transform = s.special === 'swell' ? 'scale(1.2)' : 'scale(1)';
        }

        function showFinal() {
            const flash = document.getElementById('flash-overlay');
            flash.style.opacity = '1';
            
            setTimeout(() => {
                document.getElementById('page-lab').classList.add('page-hidden');
                document.getElementById('page-res').classList.remove('page-hidden');
                flash.style.opacity = '0';

                if (shuffled.length === 0) shuffled = [...allResults].sort(() => Math.random() - 0.5);
                const res = shuffled.pop();

                document.getElementById('res-title').textContent = res.title;
                document.getElementById('res-formula').textContent = res.formula;
                document.getElementById('res-desc').textContent = res.desc;
                document.getElementById('final-img').src = res.file;
                
                const b = document.getElementById('res-badge');
                b.textContent = res.isPathology ? 'Clinical Pathology' : 'Normal Result';
                b.className = `inline-block px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-[0.2em] mb-6 ${res.badge} text-white`;

                const acc = document.getElementById('pathology-accordion');
                acc.innerHTML = '';
                if (res.isPathology) {
                    res.details.forEach(d => {
                        acc.innerHTML += `
                            <details class="group bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden transition-all">
                                <summary class="flex justify-between items-center p-5 cursor-pointer hover:bg-slate-800">
                                    <span class="text-[10px] font-black text-blue-500 uppercase tracking-widest">${d.title}</span>
                                    <span class="text-slate-500 transition-transform">▼</span>
                                </summary>
                                <div class="px-5 pb-5 text-sm text-slate-400 font-light leading-relaxed">${d.text}</div>
                            </details>
                        `;
                    });
                }
            }, 500);
        }
    </script>
</body>
</html>
